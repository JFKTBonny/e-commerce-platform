server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # SPA routing only — no API proxy
    location / {
        try_files $uri $uri/ /index.html;
    }
}
