name: Create EKS Cluster & Bootstrap Jenkins

on:
  workflow_dispatch:    # manual trigger only — never auto-create infrastructure

# ── OIDC permissions ──────────────────────────────────────────────────────────
# id-token: write tells GitHub to generate the OIDC token automatically
permissions:
  id-token: write
  contents: read

# ── Global env vars ───────────────────────────────────────────────────────────
env:
  AWS_REGION:            us-east-1
  CLUSTER_NAME:          my-eks-cluster
  TF_STATE_BUCKET:       myproject-terraform-state
  TF_STATE_LOCK_TABLE:   myproject-terraform-lock
  TF_STATE_KEY:          eks/terraform.tfstate
  JENKINS_NAMESPACE:     jenkins
  JENKINS_RELEASE_NAME:  jenkins
  JENKINS_CHART_VERSION: 5.1.0     # pin chart version for reproducibility
  ARTIFACTS_BUCKET:      myproject-artifacts

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — Terraform: provision EKS cluster
  # ════════════════════════════════════════════════════════════════════════════
  provision-eks:
    name: Provision EKS Cluster
    runs-on: ubuntu-latest

    outputs:
      cluster_name:          ${{ steps.tf-outputs.outputs.cluster_name }}
      eks_oidc_provider_arn: ${{ steps.tf-outputs.outputs.eks_oidc_provider_arn }}
      eks_oidc_provider_url: ${{ steps.tf-outputs.outputs.eks_oidc_provider_url }}
      jenkins_role_arn:      ${{ steps.tf-outputs.outputs.jenkins_role_arn }}

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Assume AWS role via OIDC ───────────────────────────────────────
      # No secrets needed — GitHub injects the OIDC token automatically
      # because of the id-token: write permission above
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── 3. Verify identity ────────────────────────────────────────────────
      - name: Verify AWS identity
        run: aws sts get-caller-identity

      # ── 4. Setup Terraform ────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      # ── 5. Terraform init — connects to S3 remote state ───────────────────
      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_STATE_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      # ── 6. Terraform plan ─────────────────────────────────────────────────
      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan

      # ── 7. Upload plan to S3 — survives runner death ──────────────────────
      # We use S3 (not GitHub artifacts) because the plan contains
      # sensitive resource details and S3 is IAM-controlled
      - name: Upload Terraform plan to S3
        run: |
          aws s3 cp terraform/tfplan \
            s3://${{ env.TF_STATE_BUCKET }}/plans/tfplan-${{ github.run_id }}

      # ── 8. Terraform apply ────────────────────────────────────────────────
      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      # ── 9. Capture Terraform outputs ──────────────────────────────────────
      # These are passed to the next job via job outputs
      - name: Capture Terraform outputs
        id: tf-outputs
        working-directory: terraform
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name)" >> $GITHUB_OUTPUT
          echo "eks_oidc_provider_arn=$(terraform output -raw eks_oidc_provider_arn)" >> $GITHUB_OUTPUT
          echo "eks_oidc_provider_url=$(terraform output -raw eks_oidc_provider_url)" >> $GITHUB_OUTPUT
          echo "jenkins_role_arn=$(terraform output -raw jenkins_irsa_role_arn)" >> $GITHUB_OUTPUT

      # ── 10. Clean up plan from S3 ─────────────────────────────────────────
      - name: Delete Terraform plan from S3
        if: always()
        run: |
          aws s3 rm s3://${{ env.TF_STATE_BUCKET }}/plans/tfplan-${{ github.run_id }} \
            || true   # don't fail if already deleted

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — Update IAM: wire Jenkins IRSA role to EKS OIDC provider
  # Runs after EKS is up because eks_oidc_provider_arn only exists then
  # ════════════════════════════════════════════════════════════════════════════
  update-iam:
    name: Update Jenkins IAM Role
    runs-on: ubuntu-latest
    needs: provision-eks

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      # IAM stack has its own state key — separate from EKS state
      - name: Terraform Init (IAM stack)
        working-directory: iam
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=iam/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_STATE_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      # Re-apply IAM stack now that EKS OIDC provider ARN is available
      # This wires the Jenkins IRSA role trust policy to the cluster
      - name: Terraform Apply (IAM stack)
        working-directory: iam
        run: |
          terraform apply -auto-approve \
            -var="eks_oidc_provider_arn=${{ needs.provision-eks.outputs.eks_oidc_provider_arn }}" \
            -var="eks_oidc_provider_url=${{ needs.provision-eks.outputs.eks_oidc_provider_url }}" \
            -var="github_repo=${{ github.repository }}" \
            -var="state_bucket_name=${{ env.TF_STATE_BUCKET }}" \
            -var="state_lock_table=${{ env.TF_STATE_LOCK_TABLE }}" \
            -var="artifacts_bucket_name=${{ env.ARTIFACTS_BUCKET }}"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3 — Bootstrap Jenkins on EKS via Helm
  # ════════════════════════════════════════════════════════════════════════════
  bootstrap-jenkins:
    name: Bootstrap Jenkins
    runs-on: ubuntu-latest
    needs: [provision-eks, update-iam]

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Install tools ─────────────────────────────────────────────────────
      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      # ── Configure kubectl ─────────────────────────────────────────────────
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ needs.provision-eks.outputs.cluster_name }} \
            --region ${{ env.AWS_REGION }}

      # ── Verify cluster access ─────────────────────────────────────────────
      - name: Verify cluster nodes
        run: kubectl get nodes

      # ── Create Jenkins namespace ──────────────────────────────────────────
      - name: Create Jenkins namespace
        run: |
          kubectl create namespace ${{ env.JENKINS_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # ── Create Jenkins service account with IRSA annotation ───────────────
      # This is what binds the Jenkins pod to the IAM role via IRSA
      - name: Create Jenkins service account
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: jenkins-sa
            namespace: ${{ env.JENKINS_NAMESPACE }}
            annotations:
              eks.amazonaws.com/role-arn: ${{ needs.provision-eks.outputs.jenkins_role_arn }}
          EOF

      # ── Add Jenkins Helm repo ─────────────────────────────────────────────
      - name: Add Jenkins Helm repo
        run: |
          helm repo add jenkins https://charts.jenkins.io
          helm repo update

      # ── Deploy Jenkins via Helm ───────────────────────────────────────────
      # jenkins-values.yaml is in the repo under kubernetes/
      - name: Deploy Jenkins
        run: |
          helm upgrade --install ${{ env.JENKINS_RELEASE_NAME }} jenkins/jenkins \
            --namespace ${{ env.JENKINS_NAMESPACE }} \
            --version ${{ env.JENKINS_CHART_VERSION }} \
            --values kubernetes/jenkins-values.yaml \
            --set controller.serviceAccount.name=jenkins-sa \
            --set controller.serviceAccount.create=false \
            --wait \
            --timeout 10m

      # ── Verify Jenkins is running ─────────────────────────────────────────
      - name: Verify Jenkins deployment
        run: |
          kubectl rollout status deployment/${{ env.JENKINS_RELEASE_NAME }} \
            -n ${{ env.JENKINS_NAMESPACE }} \
            --timeout=300s

      # ── Retrieve Jenkins initial admin password ───────────────────────────
      - name: Get Jenkins initial admin password
        run: |
          echo "Jenkins initial admin password:"
          kubectl exec \
            -n ${{ env.JENKINS_NAMESPACE }} \
            -it $(kubectl get pods -n ${{ env.JENKINS_NAMESPACE }} -l app.kubernetes.io/name=jenkins -o jsonpath="{.items[0].metadata.name}") \
            -- cat /run/secrets/additional/chart-admin-password

      # ── Save Jenkins URL as workflow summary ──────────────────────────────
      - name: Print Jenkins access info
        run: |
          JENKINS_IP=$(kubectl get svc \
            ${{ env.JENKINS_RELEASE_NAME }} \
            -n ${{ env.JENKINS_NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "## ✅ Jenkins is ready" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: http://${JENKINS_IP}:8080" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster**: ${{ needs.provision-eks.outputs.cluster_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Jenkins IAM Role**: ${{ needs.provision-eks.outputs.jenkins_role_arn }}" >> $GITHUB_STEP_SUMMARY