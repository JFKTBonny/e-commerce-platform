name: Destroy EKS Cluster

on:
  workflow_dispatch:    # manual trigger only — never auto-destroy
    inputs:
      confirm:
        description: "Type DESTROY to confirm cluster deletion"
        required: true
        type: string
      take_jenkins_snapshot:
        description: "Snapshot Jenkins EBS volume before destroy?"
        required: true
        type: boolean
        default: true

# ── OIDC permissions ──────────────────────────────────────────────────────────
permissions:
  id-token: write
  contents: read

# ── Global env vars ───────────────────────────────────────────────────────────
env:
  AWS_REGION:            us-east-1
  CLUSTER_NAME:          my-eks-cluster
  TF_STATE_BUCKET:       myproject-terraform-state
  TF_STATE_LOCK_TABLE:   myproject-terraform-lock
  TF_STATE_KEY:          eks/terraform.tfstate
  JENKINS_NAMESPACE:     jenkins
  JENKINS_RELEASE_NAME:  jenkins

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # GUARD — reject if confirmation input is wrong
  # ════════════════════════════════════════════════════════════════════════════
  confirm-destroy:
    name: Confirm Destroy
    runs-on: ubuntu-latest

    steps:
      - name: Check confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
            echo "❌ Confirmation failed — you must type DESTROY to proceed"
            exit 1
          fi
          echo "✅ Confirmation accepted — proceeding with cluster destruction"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — Snapshot Jenkins EBS volume (optional but default true)
  # Preserves pipeline history, job configs, and credentials
  # before the cluster and its PVCs are deleted
  # ════════════════════════════════════════════════════════════════════════════
  snapshot-jenkins:
    name: Snapshot Jenkins EBS Volume
    runs-on: ubuntu-latest
    needs: confirm-destroy
    if: ${{ github.event.inputs.take_jenkins_snapshot == 'true' }}

    steps:

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      # Find the EBS volume ID backing the Jenkins PVC
      - name: Find Jenkins EBS volume
        id: find-volume
        run: |
          PVC_NAME=$(kubectl get pvc \
            -n ${{ env.JENKINS_NAMESPACE }} \
            -l app.kubernetes.io/name=jenkins \
            -o jsonpath='{.items[0].metadata.name}')

          PV_NAME=$(kubectl get pvc ${PVC_NAME} \
            -n ${{ env.JENKINS_NAMESPACE }} \
            -o jsonpath='{.spec.volumeName}')

          VOLUME_ID=$(kubectl get pv ${PV_NAME} \
            -o jsonpath='{.spec.csi.volumeHandle}')

          echo "volume_id=${VOLUME_ID}" >> $GITHUB_OUTPUT
          echo "Found Jenkins EBS volume: ${VOLUME_ID}"

      # Take snapshot before destroying anything
      - name: Snapshot Jenkins EBS volume
        id: snapshot
        run: |
          SNAPSHOT_ID=$(aws ec2 create-snapshot \
            --volume-id ${{ steps.find-volume.outputs.volume_id }} \
            --description "Jenkins backup before cluster destroy - run ${{ github.run_id }}" \
            --tag-specifications \
              "ResourceType=snapshot,Tags=[
                {Key=Name,Value=jenkins-backup-${{ github.run_id }}},
                {Key=ClusterName,Value=${{ env.CLUSTER_NAME }}},
                {Key=CreatedBy,Value=github-actions},
                {Key=RunId,Value=${{ github.run_id }}}
              ]" \
            --query 'SnapshotId' \
            --output text)

          echo "snapshot_id=${SNAPSHOT_ID}" >> $GITHUB_OUTPUT
          echo "✅ Snapshot started: ${SNAPSHOT_ID}"

      # Wait for snapshot to complete before allowing destroy to proceed
      - name: Wait for snapshot completion
        run: |
          echo "Waiting for snapshot ${{ steps.snapshot.outputs.snapshot_id }} to complete..."
          aws ec2 wait snapshot-completed \
            --snapshot-ids ${{ steps.snapshot.outputs.snapshot_id }}
          echo "✅ Snapshot complete: ${{ steps.snapshot.outputs.snapshot_id }}"

      # Print snapshot ID to workflow summary for future reference
      - name: Record snapshot ID
        run: |
          echo "## 📸 Jenkins EBS Snapshot" >> $GITHUB_STEP_SUMMARY
          echo "- **Snapshot ID**: ${{ steps.snapshot.outputs.snapshot_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Volume ID**: ${{ steps.find-volume.outputs.volume_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run ID**: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To restore Jenkins on next cluster creation, pass this snapshot ID" >> $GITHUB_STEP_SUMMARY
          echo "to the \`jenkins-values.yaml\` as the \`dataSource\` for the PVC." >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — Teardown Jenkins gracefully before destroying the cluster
  # Prevents PVC/PV finalizer deadlocks during terraform destroy
  # ════════════════════════════════════════════════════════════════════════════
  teardown-jenkins:
    name: Teardown Jenkins
    runs-on: ubuntu-latest
    needs: [confirm-destroy, snapshot-jenkins]
    # Run even if snapshot was skipped
    if: |
      always() &&
      needs.confirm-destroy.result == 'success' &&
      (needs.snapshot-jenkins.result == 'success' || needs.snapshot-jenkins.result == 'skipped')

    steps:

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      # Uninstall Jenkins Helm release — removes deployment, services, configmaps
      - name: Uninstall Jenkins Helm release
        run: |
          helm uninstall ${{ env.JENKINS_RELEASE_NAME }} \
            --namespace ${{ env.JENKINS_NAMESPACE }} \
            --wait \
            --timeout 5m \
            || echo "Jenkins release not found — skipping"

      # Delete PVC explicitly — prevents PV finalizer from blocking terraform destroy
      - name: Delete Jenkins PVC
        run: |
          kubectl delete pvc \
            -n ${{ env.JENKINS_NAMESPACE }} \
            -l app.kubernetes.io/name=jenkins \
            --wait=true \
            --timeout=120s \
            || echo "No PVCs found — skipping"

      # Delete namespace last
      - name: Delete Jenkins namespace
        run: |
          kubectl delete namespace ${{ env.JENKINS_NAMESPACE }} \
            --wait=true \
            --timeout=120s \
            || echo "Namespace not found — skipping"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3 — Terraform destroy EKS cluster
  # ════════════════════════════════════════════════════════════════════════════
  destroy-eks:
    name: Destroy EKS Cluster
    runs-on: ubuntu-latest
    needs: [confirm-destroy, teardown-jenkins]
    if: |
      always() &&
      needs.confirm-destroy.result == 'success' &&
      needs.teardown-jenkins.result == 'success'

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      # Pull the exact same state that was used during creation
      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_STATE_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      # Show what will be destroyed before doing it
      - name: Terraform Plan Destroy
        working-directory: terraform
        run: terraform plan -destroy -out=destroy-plan

      # Upload destroy plan to S3 for audit trail
      - name: Upload destroy plan to S3
        run: |
          aws s3 cp terraform/destroy-plan \
            s3://${{ env.TF_STATE_BUCKET }}/plans/destroy-plan-${{ github.run_id }}

      - name: Terraform Destroy
        working-directory: terraform
        run: terraform apply -auto-approve destroy-plan

      # Clean up plan from S3 after successful destroy
      - name: Delete destroy plan from S3
        if: always()
        run: |
          aws s3 rm \
            s3://${{ env.TF_STATE_BUCKET }}/plans/destroy-plan-${{ github.run_id }} \
            || true

      - name: Confirm destruction
        run: |
          echo "## 🗑️ EKS Cluster Destroyed" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster**: ${{ env.CLUSTER_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run ID**: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ℹ️ S3 state bucket and DynamoDB lock table are preserved." >> $GITHUB_STEP_SUMMARY
          echo "ℹ️ IAM roles are preserved." >> $GITHUB_STEP_SUMMARY
          