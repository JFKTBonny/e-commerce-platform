networks:
  ecommerce: { driver: bridge }

volumes:
  mysql_data:

services:

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [ecommerce]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  api-gateway:
    image: santonix/api-gateway:latest
    ports: ["3000:3000"]
    environment:
      JWT_SECRET:          ${JWT_SECRET}
      USER_SERVICE_URL:    http://user-service:8081
      PRODUCT_SERVICE_URL: http://product-service:8082
      ORDER_SERVICE_URL:   http://order-service:8083
    depends_on: [user-service, product-service, order-service]
    networks: [ecommerce]

  user-service:
    image: santonix/user-service:latest
    ports: ["8081:8081"]
    environment:
      DB_HOST:    mysql
      DB_USER:    root
      DB_PASS:    ${DB_ROOT_PASS}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql: { condition: service_healthy }
    networks: [ecommerce]

  product-service:
    image: santonix/product-service:latest
    ports: ["8082:8082"]
    environment:
      DB_HOST:    mysql
      DB_USER:    root
      DB_PASS:    ${DB_ROOT_PASS}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql: { condition: service_healthy }
    networks: [ecommerce]

  order-service:
    image: santonix/order-service:latest
    ports: ["8083:8083"]
    environment:
      DB_HOST:    mysql
      DB_USER:    root
      DB_PASS:    ${DB_ROOT_PASS}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql: { condition: service_healthy }
    networks: [ecommerce]
