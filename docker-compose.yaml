

networks:
  ecommerce: { driver: bridge }

volumes:
  mysql_data:

services:

  mysql:
    image: mysql:8.0
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infrastructure/docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [ecommerce]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  api-gateway:
    build: ./services/api-gateway
    env_file: .env
    ports: ["3000:3000"]
    environment:
      JWT_SECRET:          ${JWT_SECRET}
      USER_SERVICE_URL:    http://user-service:8081
      PRODUCT_SERVICE_URL: http://product-service:8082
      ORDER_SERVICE_URL:   http://order-service:8083
      CART_SERVICE_URL:    http://cart-service:8085
    depends_on: [user-service, product-service, order-service, cart-service]
    networks: [ecommerce]

  user-service:
    build: ./services/user-service
    ports: ["8081:8081"]
    env_file: .env
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASS: ${DB_ROOT_PASS}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql: { condition: service_healthy }
    networks: [ecommerce]

  product-service:
    build: ./services/product-service
    ports: ["8082:8082"]
    env_file: .env
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASS: ${DB_ROOT_PASS}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql: { condition: service_healthy }
    networks: [ecommerce]

  order-service:
    build: ./services/order-service
    ports: ["8083:8083"]
    env_file: .env
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASS: ${DB_ROOT_PASS}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql: { condition: service_healthy }
    networks: [ecommerce]


