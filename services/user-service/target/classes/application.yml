spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/users_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASS:secret}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect

app:
  jwt-secret: ${JWT_SECRET:bonny-walter-super-secret-key-2024}
  jwt-expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info
server:
  port: 8081
